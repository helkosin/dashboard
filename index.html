<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        button { background: #0088cc; color: white; border: none; padding: 15px; margin: 10px; border-radius: 8px; width: 80%; }
    </style>
</head>
<body>
    <h2>🚀 Lab Controller</h2>
    <p id="pc-name">System: Checking...</p>
    
    <button onclick="sendCommand('screenshot')">🖥 Take Screenshot</button>
    <button onclick="sendCommand('taskmgr')">📊 Refresh Tasks</button>
    <button style="background: #cc0000;" onclick="sendCommand('shutdown')">🛑 Shutdown Node</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Opens the app to full height

        function sendCommand(cmd) {
            tg.sendData(cmd); // Sends the string back to your Python script
            tg.close(); // Closes the app after sending
        }
    </script>
</body>
</html>
